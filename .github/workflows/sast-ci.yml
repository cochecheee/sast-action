name: SAST CI (reusable)

# Reusable workflow — inheritor repos call this with one block:
#
#   jobs:
#     security:
#       uses: cochecheee/sast-action/.github/workflows/sast-ci.yml@v0.2.0
#       with:
#         language: python    # java | python | node | go
#       secrets:
#         dashboard_url:   ${{ secrets.MCP_GATEWAY_URL }}
#         dashboard_token: ${{ secrets.MCP_WEBHOOK_TOKEN }}
#
# Behavior:
#   1. Run language-appropriate SAST tools via actions/sast-suite
#   2. Upload outputs as a workflow artifact (chat-system poller picks up)
#   3. Notify the dashboard with run metadata via actions/notify-dashboard
#
# Tools per language:
#   java:   semgrep, trivy-fs, spotbugs, dep-check
#   python: semgrep, trivy-fs, bandit, safety
#   node:   semgrep, trivy-fs, eslint-security, npm-audit
#   go:     semgrep, trivy-fs, gosec

on:
  workflow_call:
    inputs:
      language:
        description: 'Source language (java|python|node|go)'
        required: true
        type: string
      semgrep_config:
        description: 'Semgrep ruleset'
        required: false
        type: string
        default: 'auto'
      pipeline_status:
        description: 'Override pipeline_status sent to dashboard'
        required: false
        type: string
        default: 'passed'
      # ---- CD inputs (V2.2) ----
      deploy:
        description: 'Build + push Docker image and trigger Render staging redeploy. Requires docker_* and render_deploy_hook secrets.'
        required: false
        type: boolean
        default: false
      image_repo:
        description: 'Docker Hub repo (cochecheee/<repo>). Required when deploy=true.'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Path to Dockerfile relative to build_context.'
        required: false
        type: string
        default: 'Dockerfile'
      build_context:
        description: 'Docker build context.'
        required: false
        type: string
        default: '.'
      # ---- DAST inputs (V2.3) ----
      dast:
        description: 'Run OWASP ZAP baseline scan against the staging URL after CD. Requires staging_url input.'
        required: false
        type: boolean
        default: false
      staging_url:
        description: 'Public URL ZAP scans. Required when dast=true. e.g. https://sample-python-latest.onrender.com'
        required: false
        type: string
        default: ''
      dast_scan_type:
        description: 'baseline (passive, ~5min) | full (active, ~30min)'
        required: false
        type: string
        default: 'baseline'
      # ---- Security Gate inputs (V2.7) ----
      gate_enabled:
        description: 'Báo cáo tiến độ docx ch.4.2 stage 7 — block job if critical/high vượt threshold. Default true (chỉ pass nếu 0 critical).'
        required: false
        type: boolean
        default: true
      gate_fail_on_critical:
        description: 'Số critical findings tối thiểu để fail. Default 1.'
        required: false
        type: number
        default: 1
      gate_fail_on_high:
        description: 'Số high findings tối thiểu để fail. Default 5.'
        required: false
        type: number
        default: 5
    secrets:
      dashboard_url:
        description: 'chat-system MCP Gateway URL. Declared as a secret because GitHub disallows secret references in caller with-blocks.'
        required: false
      dashboard_token:
        description: 'Bearer token matching CI_WEBHOOK_TOKEN'
        required: false
      nvd_api_key:
        description: 'NVD API key for Dep-Check (Java only). Optional but recommended.'
        required: false
      # ---- CD secrets (V2.2) ----
      docker_username:
        description: 'Docker Hub username. Required when deploy=true.'
        required: false
      docker_password:
        description: 'Docker Hub access token. Required when deploy=true.'
        required: false
      render_deploy_hook:
        description: 'Render Deploy Hook URL (Settings → Deploy Hook). Required when deploy=true.'
        required: false

permissions:
  contents: read
  security-events: write
  actions: read

# NOTE V2.7: composite `uses:` refs pinned to @verify-work while branch
# is smoke-tested. SWAP to @master (or @v0.2.0 tag) khi merge sang master
# — không sẽ fail "Set up job" với "Can't find action.yml" vì
# security-gate chỉ có ở verify-work.

jobs:
  sast:
    name: SAST (${{ inputs.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # GitHub forbids `secrets.*` in step-level `if:` and bare `${{ secrets.* }}`
      # in some contexts, so we bind once at job level then reference env.* below.
      NVD_API_KEY:     ${{ secrets.nvd_api_key }}
      DASHBOARD_URL:   ${{ secrets.dashboard_url }}
      DASHBOARD_TOKEN: ${{ secrets.dashboard_token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SAST suite
        uses: cochecheee/sast-action/actions/sast-suite@verify-work
        with:
          language: ${{ inputs.language }}
          semgrep-config: ${{ inputs.semgrep_config }}
          upload-individual-artifacts: 'true'

      - name: Notify chat-system dashboard
        if: env.DASHBOARD_URL != ''
        uses: cochecheee/sast-action/actions/notify-dashboard@verify-work
        with:
          dashboard-url:   ${{ env.DASHBOARD_URL }}
          dashboard-token: ${{ env.DASHBOARD_TOKEN }}
          pipeline-status: ${{ inputs.pipeline_status }}
          fail-on-error: 'false'

  # ============================================================
  # Security Gate — V2.7 / báo cáo tiến độ docx ch.4.2 stage 7
  # Parse sast-reports artifact, đếm critical+high. Fail nếu vượt
  # threshold → CD + DAST không chạy → block PR / merge.
  # Inheritor có thể tắt: `with: gate_enabled: false`.
  # ============================================================
  gate:
    name: Security Gate
    needs: sast
    if: ${{ inputs.gate_enabled }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run gate
        uses: cochecheee/sast-action/actions/security-gate@verify-work
        with:
          fail_on_critical: ${{ inputs.gate_fail_on_critical }}
          fail_on_high:     ${{ inputs.gate_fail_on_high }}

  # ============================================================
  # CD — Build image + deploy Render staging (V2.2)
  # Runs only when caller sets `with: deploy: true`. Requires
  # docker_username / docker_password / render_deploy_hook secrets.
  # `needs: [sast, gate]` — chỉ deploy khi SAST xong + gate pass.
  # Khi gate_enabled=false, gate job skipped → vẫn deploy (back-compat).
  # ============================================================
  cd:
    name: CD (build + deploy)
    needs: [sast, gate]
    # Cho phép chạy khi gate skipped (gate_enabled=false) hoặc gate success.
    # Không dùng always() vì muốn block khi gate fail hoặc sast fail.
    if: ${{ inputs.deploy && needs.sast.result == 'success' && (needs.gate.result == 'success' || needs.gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    # Bind secrets to env so step-level `if:` can reference them.
    env:
      DOCKER_USERNAME:    ${{ secrets.docker_username }}
      DOCKER_PASSWORD:    ${{ secrets.docker_password }}
      RENDER_DEPLOY_HOOK: ${{ secrets.render_deploy_hook }}
    steps:
      - uses: actions/checkout@v4

      - name: Build & push image
        id: build
        uses: cochecheee/sast-action/actions/build-image@verify-work
        with:
          image_repo:      ${{ inputs.image_repo }}
          dockerfile:      ${{ inputs.dockerfile }}
          build_context:   ${{ inputs.build_context }}
          docker_username: ${{ env.DOCKER_USERNAME }}
          docker_password: ${{ env.DOCKER_PASSWORD }}

      - name: Deploy to Render staging
        if: env.RENDER_DEPLOY_HOOK != ''
        uses: cochecheee/sast-action/actions/deploy-staging@verify-work
        with:
          render_deploy_hook: ${{ env.RENDER_DEPLOY_HOOK }}
          service_name: ${{ inputs.image_repo }}
          wait_seconds: '0'

      - name: Summary
        shell: bash
        run: |
          echo "::notice::CD complete. Image: ${{ steps.build.outputs.image_tag }}"

  # ============================================================
  # DAST — Runtime security scan (V2.3)
  # Runs ZAP baseline against the deployed staging URL. Independent
  # job so it can wait for Render redeploy without blocking SAST/CD.
  # ============================================================
  dast:
    name: DAST (ZAP ${{ inputs.dast_scan_type }})
    needs: cd
    if: ${{ inputs.dast && inputs.staging_url != '' && needs.cd.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write       # ZAP action wants this even when allow_issue_writing=false
    env:
      DASHBOARD_URL:   ${{ secrets.dashboard_url }}
      DASHBOARD_TOKEN: ${{ secrets.dashboard_token }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait 60s for Render to roll new container
        shell: bash
        run: sleep 60

      - name: Run OWASP ZAP
        uses: cochecheee/sast-action/actions/run-dast@verify-work
        with:
          target_url: ${{ inputs.staging_url }}
          scan_type:  ${{ inputs.dast_scan_type }}
          fail_on_warn: 'false'

      - name: Notify chat-system (DAST done)
        if: env.DASHBOARD_URL != ''
        uses: cochecheee/sast-action/actions/notify-dashboard@verify-work
        with:
          dashboard-url:   ${{ env.DASHBOARD_URL }}
          dashboard-token: ${{ env.DASHBOARD_TOKEN }}
          pipeline-status: dast_complete
          fail-on-error: 'false'
