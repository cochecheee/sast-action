name: 'SAST Chat — Aggregate SARIF'
description: >-
  Walk a reports directory and POST each SARIF/JSON file individually to
  the chat-system MCP Gateway's /artifacts/process endpoint. Used by
  the reusable workflow as an alternative path when the dashboard
  cannot pull GitHub artifacts directly (private/disabled artifacts,
  third-party CI, etc.).

  When in doubt, prefer notify-dashboard + the chat-system poller —
  this action is for advanced setups that push reports inline.
author: 'cocheche'
branding:
  icon: 'upload-cloud'
  color: 'orange'

inputs:
  reports-dir:
    description: 'Directory containing SARIF/JSON reports (output of sast-suite).'
    required: true
  dashboard-url:
    description: 'Public base URL of the chat-system MCP Gateway.'
    required: true
  dashboard-api-key:
    description: 'X-API-Key for /artifacts/process. Optional if CI_API_KEY is unset server-side.'
    required: false
    default: ''
  project-id:
    description: 'Numeric Project.id in chat-system DB to attach findings to.'
    required: true

outputs:
  uploaded-count:
    description: 'Number of report files successfully POSTed.'
    value: ${{ steps.upload.outputs.count }}

runs:
  using: 'composite'
  steps:
    - name: POST each report
      id: upload
      shell: bash
      env:
        DIR:        ${{ inputs.reports-dir }}
        URL:        ${{ inputs.dashboard-url }}
        API_KEY:    ${{ inputs.dashboard-api-key }}
        PROJECT_ID: ${{ inputs.project-id }}
      run: |
        if [ ! -d "$DIR" ]; then
          echo "::warning::Reports dir '$DIR' not found — nothing to upload."
          echo "count=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        AUTH=()
        [ -n "$API_KEY" ] && AUTH=(-H "X-API-Key: $API_KEY")
        COUNT=0
        for f in "$DIR"/*.{sarif,json,xml}; do
          [ -f "$f" ] || continue
          NAME=$(basename "$f")
          STATUS=$(curl -s -o /tmp/up-resp.txt -w "%{http_code}" \
            --max-time 30 \
            -X POST "${URL%/}/artifacts/process" \
            -H "Content-Type: application/json" \
            "${AUTH[@]}" \
            -d "$(jq -nc --arg pid "$PROJECT_ID" --arg name "$NAME" --rawfile content "$f" \
                  '{project_id: ($pid|tonumber), artifact_name: $name, content: $content}')" \
            || echo 0)
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "202" ]; then
            COUNT=$((COUNT+1))
            echo "::notice::uploaded $NAME"
          else
            echo "::warning::$NAME -> HTTP $STATUS"
            head -c 400 /tmp/up-resp.txt 2>/dev/null
            echo
          fi
        done
        echo "count=$COUNT" >> "$GITHUB_OUTPUT"
        echo "Uploaded $COUNT report(s)."
