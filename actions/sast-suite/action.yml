name: 'SAST Chat — SAST Suite'
description: >-
  Run the language-appropriate SAST tools and emit SARIF/JSON artifacts
  with the names chat-system's processor expects. Picks the toolset
  based on the `language` input so an inheritor repo only declares the
  language and gets the right scans.

  Set `tool` to run a SINGLE tool (parallel-matrix mode — the reusable
  workflow spawns one job per tool). Leave `tool` empty to run the whole
  suite as sequential steps in one job (back-compat).
author: 'cocheche'
branding:
  icon: 'shield'
  color: 'orange'

inputs:
  language:
    description: 'Source language (java|python|node|go). Selects which tools run.'
    required: true
  semgrep-config:
    description: 'Semgrep ruleset (auto|p/owasp-top-ten|...).'
    required: false
    default: 'auto'
  tool:
    description: >-
      Run one tool only (semgrep|codeql|trivy-fs|bandit|safety|spotbugs|
      depcheck|eslint|npm-audit|gosec). Empty = run every tool for the
      language (sequential). Used by the reusable workflow's scan matrix
      to fan the tools out into parallel jobs.
    required: false
    default: ''
  upload-individual-artifacts:
    description: 'Upload the reports/ directory as an artifact (true) or just leave the files on disk (false).'
    required: false
    default: 'true'
  artifact-name:
    description: >-
      Name of the uploaded artifact. Empty → sast-reports-<run_number>
      (full-suite default). Matrix mode passes a per-tool name such as
      sast-reports-<run_number>-<tool> so the merge job can stitch them.
    required: false
    default: ''

outputs:
  reports-dir:
    description: 'Directory containing all SARIF/JSON outputs (default: reports/).'
    value: ${{ steps.collect.outputs.dir }}

runs:
  using: 'composite'
  steps:
    # ----- Universal: Semgrep (all languages) ---------------------------
    - name: Semgrep
      if: ${{ inputs.tool == '' || inputs.tool == 'semgrep' }}
      shell: bash
      run: |
        mkdir -p reports
        docker run --rm -v "${PWD}:/src" --workdir /src semgrep/semgrep \
          semgrep scan --config="${{ inputs.semgrep-config }}" \
          --sarif --output=reports/semgrep.sarif || true

    - name: Ensure reports dir
      shell: bash
      run: mkdir -p reports

    # ----- CodeQL (Java / Python / JavaScript / Go) ---------------------
    # Báo cáo tiến độ docx ch.4.2 — CodeQL là 1 trong 5 SAST tool bắt buộc.
    # CodeQL only supports a fixed language matrix; map our `language` input.
    # `init` builds the analysis DB; `autobuild` handles compiled langs.
    # Output dropped vào reports/codeql.sarif theo profile naming.
    - name: CodeQL — pick language
      if: ${{ (inputs.tool == '' || inputs.tool == 'codeql') && (inputs.language == 'java' || inputs.language == 'python' || inputs.language == 'node' || inputs.language == 'go') }}
      id: codeql_lang
      shell: bash
      run: |
        case "${{ inputs.language }}" in
          node) ql=javascript ;;
          *)    ql="${{ inputs.language }}" ;;
        esac
        echo "name=$ql" >> "$GITHUB_OUTPUT"

    - name: CodeQL — init
      if: ${{ (inputs.tool == '' || inputs.tool == 'codeql') && (inputs.language == 'java' || inputs.language == 'python' || inputs.language == 'node' || inputs.language == 'go') }}
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ steps.codeql_lang.outputs.name }}
        queries: security-and-quality

    - name: CodeQL — autobuild
      if: ${{ (inputs.tool == '' || inputs.tool == 'codeql') && (inputs.language == 'java' || inputs.language == 'go') }}
      uses: github/codeql-action/autobuild@v4

    - name: CodeQL — analyze
      if: ${{ (inputs.tool == '' || inputs.tool == 'codeql') && (inputs.language == 'java' || inputs.language == 'python' || inputs.language == 'node' || inputs.language == 'go') }}
      uses: github/codeql-action/analyze@v4
      with:
        output: reports/codeql
        upload: never           # we ship via our own sast-reports artifact
      continue-on-error: true   # don't block when CodeQL infra has hiccups

    - name: CodeQL — pick SARIF
      if: ${{ (inputs.tool == '' || inputs.tool == 'codeql') && (inputs.language == 'java' || inputs.language == 'python' || inputs.language == 'node' || inputs.language == 'go') }}
      shell: bash
      run: |
        # CodeQL writes <lang>.sarif per category — pick the first one
        # we find and copy as codeql.sarif (chat-system normalizer keys
        # off the runs[].tool.driver.name field, not filename).
        f=$(ls reports/codeql/*.sarif 2>/dev/null | head -1 || true)
        if [ -n "$f" ]; then
          cp "$f" reports/codeql.sarif
          echo "CodeQL SARIF copied: $(wc -c < reports/codeql.sarif) bytes"
        else
          echo "CodeQL produced no SARIF — likely init failed (continue-on-error)"
        fi

    # ----- Universal: Trivy filesystem scan -----------------------------
    - name: Trivy FS
      if: ${{ inputs.tool == '' || inputs.tool == 'trivy-fs' }}
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'reports/trivy-fs.sarif'
        severity: 'CRITICAL,HIGH,MEDIUM'
        exit-code: '0'

    # ----- Java: SpotBugs + Dep-Check -----------------------------------
    - name: Setup JDK 17
      if: ${{ (inputs.tool == '' || inputs.tool == 'spotbugs' || inputs.tool == 'depcheck') && inputs.language == 'java' }}
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: SpotBugs (Java)
      if: ${{ (inputs.tool == '' || inputs.tool == 'spotbugs') && inputs.language == 'java' }}
      shell: bash
      run: |
        # Repos committed from Windows often lose the +x bit on gradlew
        # (mode 100644) → "./gradlew: Permission denied" and, because of the
        # `|| true` guard, the tool silently produces NO report — which once
        # let a Log4Shell app PASS the gate. chmod defensively.
        chmod +x ./gradlew 2>/dev/null || true
        ./gradlew compileJava spotbugsMain --no-daemon -x test || true
        cp build/reports/spotbugs/main.sarif reports/spotbugs.sarif 2>/dev/null || true
        [ -f reports/spotbugs.sarif ] || echo "::warning::SpotBugs produced no SARIF — gate will not see its findings"

    - name: Dep-Check (Java)
      if: ${{ (inputs.tool == '' || inputs.tool == 'depcheck') && inputs.language == 'java' }}
      shell: bash
      env:
        NVD_API_KEY: ${{ env.NVD_API_KEY }}
      run: |
        chmod +x ./gradlew 2>/dev/null || true
        ./gradlew dependencyCheckAnalyze --no-daemon \
          -Dnvd.api.key="${NVD_API_KEY:-}" \
          -Dnvd.api.validForHours=720 \
          -Dformats=JSON,HTML \
          -DossindexAnalyzerEnabled=false \
          -DnodeAuditAnalyzerEnabled=false || true
        cp build/reports/dependency-check-report.json reports/depcheck.json 2>/dev/null || true
        [ -f reports/depcheck.json ] || echo "::warning::Dep-Check produced no report — CVE findings (e.g. Log4Shell) will NOT reach the gate"

    # ----- Python: Bandit + Safety --------------------------------------
    - name: Setup Python 3.12
      if: ${{ (inputs.tool == '' || inputs.tool == 'bandit' || inputs.tool == 'safety') && inputs.language == 'python' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Bandit (Python)
      if: ${{ (inputs.tool == '' || inputs.tool == 'bandit') && inputs.language == 'python' }}
      shell: bash
      run: |
        pip install 'bandit[toml]' bandit-sarif-formatter
        bandit -r . -x './.git,./.github,./reports,./venv,./.venv' \
          -f sarif -o reports/bandit.sarif || true

    - name: Safety (Python)
      if: ${{ (inputs.tool == '' || inputs.tool == 'safety') && inputs.language == 'python' }}
      shell: bash
      run: |
        # Pin safety<3 because 3.x replaced `check` with `scan` and changed
        # output flags. Stay on 2.x until we adopt the new CLI everywhere.
        pip install 'safety<3'
        REQ_FILE=""
        for f in requirements.txt requirements/base.txt requirements/main.txt; do
          [ -f "$f" ] && REQ_FILE="$f" && break
        done
        if [ -n "$REQ_FILE" ]; then
          safety check -r "$REQ_FILE" --json --output reports/safety.json || true
        else
          # Fall back to scanning whatever pip has installed in the runner.
          safety check --json --output reports/safety.json || true
        fi

    # ----- Node: ESLint security + npm audit ----------------------------
    - name: Setup Node 20
      if: ${{ (inputs.tool == '' || inputs.tool == 'eslint' || inputs.tool == 'npm-audit') && inputs.language == 'node' }}
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: ESLint security (Node)
      if: ${{ (inputs.tool == '' || inputs.tool == 'eslint') && inputs.language == 'node' }}
      shell: bash
      run: |
        npm install --save-dev eslint eslint-plugin-security @microsoft/eslint-formatter-sarif || true
        cat > .eslintrc.json <<EOF
        {"plugins":["security"],"extends":["plugin:security/recommended"],"env":{"browser":true,"es2021":true}}
        EOF
        npx eslint . --ext .js,.ts,.jsx,.tsx \
          --format @microsoft/eslint-formatter-sarif \
          --output-file reports/eslint.sarif || true

    - name: npm audit (Node)
      if: ${{ (inputs.tool == '' || inputs.tool == 'npm-audit') && inputs.language == 'node' }}
      shell: bash
      run: |
        npm audit --json > reports/npm-audit.json || true

    # ----- Go: gosec ----------------------------------------------------
    - name: gosec (Go)
      if: ${{ (inputs.tool == '' || inputs.tool == 'gosec') && inputs.language == 'go' }}
      uses: securego/gosec@master
      with:
        args: '-fmt=sarif -out=reports/gosec.sarif ./...'

    # ----- Collect ------------------------------------------------------
    - name: Collect outputs
      id: collect
      shell: bash
      run: |
        ls -la reports/ || true
        echo "dir=reports" >> "$GITHUB_OUTPUT"

    - name: Upload artifact
      if: ${{ inputs.upload-individual-artifacts == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name != '' && inputs.artifact-name || format('sast-reports-{0}', github.run_number) }}
        path: reports/
        retention-days: 30
        if-no-files-found: ignore
