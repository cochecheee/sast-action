name: 'SAST Chat — Build & Push Image'
description: >-
  Build a Docker image for the inheritor project, run Trivy image scan,
  and push both `<sha>` and `latest` tags to Docker Hub. Designed to slot
  into the V2.2 CD pipeline before deploy-staging triggers a redeploy.
author: 'cocheche'
branding:
  icon: 'package'
  color: 'orange'

inputs:
  image_repo:
    description: 'Docker Hub repo (e.g. cochecheee/sample-python). Will be tagged :<sha> and :latest.'
    required: true
  dockerfile:
    description: 'Path to Dockerfile relative to the build context.'
    required: false
    default: 'Dockerfile'
  build_context:
    description: 'Docker build context.'
    required: false
    default: '.'
  docker_username:
    description: 'Docker Hub username for `docker login`.'
    required: true
  docker_password:
    description: 'Docker Hub access token (NOT password — generate at hub.docker.com → Security).'
    required: true
  trivy_severity:
    description: 'Severity filter for the image scan SARIF.'
    required: false
    default: 'CRITICAL,HIGH'
  push:
    description: 'Set "false" to build + scan only (skip push). Useful for PR builds.'
    required: false
    default: 'true'

outputs:
  image_tag:
    description: 'Fully-qualified image tag with short SHA, e.g. cochecheee/sample-python:7638d9c'
    value: ${{ steps.meta.outputs.tag }}
  image_short_sha:
    description: '7-char short SHA used in the tag.'
    value: ${{ steps.meta.outputs.short_sha }}

runs:
  using: 'composite'
  steps:
    - name: Compute tag
      id: meta
      shell: bash
      run: |
        SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
        echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
        echo "tag=${{ inputs.image_repo }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
        echo "Image will be tagged: ${{ inputs.image_repo }}:${SHORT_SHA} + :latest"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      if: ${{ inputs.push == 'true' }}
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.docker_username }}
        password: ${{ inputs.docker_password }}

    - name: Build image (load for local scan)
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.build_context }}
        file: ${{ inputs.build_context }}/${{ inputs.dockerfile }}
        load: true
        tags: |
          ${{ steps.meta.outputs.tag }}
          ${{ inputs.image_repo }}:latest

    - name: Trivy image scan (SARIF)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.meta.outputs.tag }}
        format: 'sarif'
        output: 'trivy-image.sarif'
        severity: ${{ inputs.trivy_severity }}
        ignore-unfixed: true
        exit-code: '0'
      continue-on-error: true

    - name: Upload Trivy image SARIF
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-image-scan-${{ github.run_number }}
        path: trivy-image.sarif
        retention-days: 30

    - name: Push image
      if: ${{ inputs.push == 'true' }}
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.build_context }}
        file: ${{ inputs.build_context }}/${{ inputs.dockerfile }}
        push: true
        tags: |
          ${{ steps.meta.outputs.tag }}
          ${{ inputs.image_repo }}:latest

    - name: Summary
      if: always()
      shell: bash
      run: |
        echo "::notice::Image built: ${{ steps.meta.outputs.tag }}"
        if [ "${{ inputs.push }}" = "true" ]; then
          echo "::notice::Pushed to Docker Hub as :${{ steps.meta.outputs.short_sha }} + :latest"
        else
          echo "::notice::Skipped push (input push=false)"
        fi
