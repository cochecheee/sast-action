name: 'SAST Chat Notify'
description: >-
  POST a GitHub Actions workflow run summary to a chat-system MCP Gateway.
  Drop-in replacement for the bespoke notify step in security pipelines —
  emits the JSON shape the gateway expects (run_id required, the rest
  ignored gracefully) and tolerates gateway downtime so it never blocks CI.
author: 'cocheche'
branding:
  icon: 'shield'
  color: 'orange'

inputs:
  dashboard-url:
    description: 'Public base URL of the chat-system MCP Gateway (no trailing slash). Equivalent to the MCP_GATEWAY_URL secret.'
    required: true
  dashboard-token:
    description: 'Bearer token. Must match CI_WEBHOOK_TOKEN in chat-system .env. Set CI_WEBHOOK_TOKEN empty server-side to disable auth.'
    required: false
    default: ''
  pipeline-status:
    description: 'Overall pipeline status to record (passed|failed|gate_failed|unknown).'
    required: false
    default: 'unknown'
  fail-on-error:
    description: 'When "true" the action fails the job if the webhook call fails. Default "false" so dashboard outages never block CI.'
    required: false
    default: 'false'
  timeout-seconds:
    description: 'Per-request timeout for the webhook call.'
    required: false
    default: '20'

outputs:
  http-status:
    description: 'HTTP status code returned by the gateway (or "0" on network failure).'
    value: ${{ steps.notify.outputs.http_status }}
  accepted:
    description: '"true" iff the gateway answered 202 Accepted.'
    value: ${{ steps.notify.outputs.accepted }}

runs:
  using: 'composite'
  steps:
    - name: Build run-metadata.json
      id: meta
      shell: bash
      run: |
        cat > run-metadata.json <<EOF
        {
          "run_id": ${GITHUB_RUN_ID},
          "run_number": "${GITHUB_RUN_NUMBER}",
          "repository": "${GITHUB_REPOSITORY}",
          "ref": "${GITHUB_REF}",
          "sha": "${GITHUB_SHA}",
          "actor": "${GITHUB_ACTOR}",
          "event": "${GITHUB_EVENT_NAME}",
          "pipeline_status": "${PIPELINE_STATUS}",
          "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOF
        echo "metadata file built"
      env:
        PIPELINE_STATUS: ${{ inputs.pipeline-status }}

    - name: POST to chat-system webhook
      id: notify
      shell: bash
      env:
        DASHBOARD_URL:   ${{ inputs.dashboard-url }}
        DASHBOARD_TOKEN: ${{ inputs.dashboard-token }}
        TIMEOUT:         ${{ inputs.timeout-seconds }}
      run: |
        if [ -z "${DASHBOARD_URL}" ]; then
          echo "::warning::dashboard-url is empty — skipping notify."
          echo "http_status=0" >> "$GITHUB_OUTPUT"
          echo "accepted=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        AUTH_HEADER=()
        if [ -n "${DASHBOARD_TOKEN}" ]; then
          AUTH_HEADER=(-H "Authorization: Bearer ${DASHBOARD_TOKEN}")
        fi

        # -w prints the status code to stdout; -o discards body.
        # Capture both so we can emit them as outputs without failing the
        # whole step on a 4xx/5xx (handled separately below).
        STATUS=$(curl -s -o /tmp/notify-resp.txt -w "%{http_code}" \
          --max-time "${TIMEOUT}" \
          -X POST "${DASHBOARD_URL%/}/webhook/pipeline-complete" \
          -H "Content-Type: application/json" \
          "${AUTH_HEADER[@]}" \
          -d @run-metadata.json) || STATUS=0

        echo "http_status=${STATUS}" >> "$GITHUB_OUTPUT"
        if [ "${STATUS}" = "202" ]; then
          echo "accepted=true" >> "$GITHUB_OUTPUT"
          echo "::notice::chat-system accepted run ${GITHUB_RUN_ID}"
        else
          echo "accepted=false" >> "$GITHUB_OUTPUT"
          echo "::warning::chat-system webhook returned HTTP ${STATUS}"
          if [ -s /tmp/notify-resp.txt ]; then
            head -c 500 /tmp/notify-resp.txt
            echo
          fi
        fi

    - name: Enforce fail-on-error
      if: ${{ inputs.fail-on-error == 'true' && steps.notify.outputs.accepted != 'true' }}
      shell: bash
      run: |
        echo "::error::SAST Chat notify failed (status=${{ steps.notify.outputs.http_status }})"
        exit 1
